<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love You Aline Moreno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a2e;
      overflow: hidden;
    }
    h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 12vw;
      color: #b44aff;
      text-align: center;
      text-shadow:
        0 0 20px rgba(180, 74, 255, 0.6),
        0 0 60px rgba(180, 74, 255, 0.3),
        0 0 100px rgba(180, 74, 255, 0.15);
      animation: pulse 3s ease-in-out infinite;
      padding: 2rem;
      line-height: 1.1;
      width: 100%;
    }
    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 20px rgba(180,74,255,0.6), 0 0 60px rgba(180,74,255,0.3), 0 0 100px rgba(180,74,255,0.15); }
      50% { text-shadow: 0 0 30px rgba(180,74,255,0.8), 0 0 80px rgba(180,74,255,0.5), 0 0 140px rgba(180,74,255,0.25); }
    }
    .hearts {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .heart {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0;
      animation: float 6s ease-in infinite;
    }
    @keyframes float {
      0% { opacity: 0; transform: translateY(100vh) scale(0.5); }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1.2); }
    }
  </style>
</head>
<body>
  <h1>I Love You<br>Aline Moreno</h1>
  <div class="hearts" id="hearts"></div>
  <script>
    const container = document.getElementById('hearts');
    for (let i = 0; i < 25; i++) {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = '\u{1F49C}';
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDelay = Math.random() * 6 + 's';
      heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
      container.appendChild(heart);
    }
  </script>
</body>
</html>
